version: '3.8'

services:
  web:
    build: .
    container_name: portal_app
    ports:
      - "${HOST_PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./app:/app
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: portal_db
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data: